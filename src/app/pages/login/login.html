<div class="login-page">

  <!-- Left Side -->
  <div class="blog-side">
    <h1>The Daily Blog</h1>
    <p class="tagline">
      Discover stories, ideas, and inspiration from writers around the world.
    </p>

    <div class="quote">
      <h3>"Every great story starts with one word."</h3>
      <p>Join thousands of readers and writers.</p>
    </div>
  </div>

  <!-- Login Card -->
  <div class="login-side">
    <div class="login-card">

      <h2>Welcome Back</h2>
      <p>Sign in to continue reading.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email">
        </div>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="input-group">
          <label>Phone</label>
          <input
            type="tel"
            formControlName="phone"
            placeholder="Enter phone number">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            formControlName="password"
            placeholder="Enter password">
        </div>

        <button
          type="submit"
          [disabled]="!formIsValid()">
          Sign In
        </button>

        <p class="signup">
          New here?
          <a routerLink="/register">Create an account</a>
        </p>

      </form>

    </div>
  </div>

</div>
