<div class="register-page">

    <!-- Left Side -->
    <div class="blog-side">

        <h1>The Daily Blog</h1>

        <p class="tagline">
            Share your stories, inspire others, and become part of a growing community of writers.
        </p>

        <div class="quote">
            <h3>"Every writer was first a reader."</h3>
            <p>Create your free account and start publishing today.</p>
        </div>

    </div>

    <!-- Right Side -->
    <div class="register-side">

        <div class="register-card">

            <h2>Create Account</h2>
            <p>Join our blogging community.</p>

            <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text"
                        formControlName="name"
                        placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email"
                        formControlName="email"
                        placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password"
                        formControlName="password"
                        placeholder="Create password">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel"
                        formControlName="phone"
                        placeholder="Enter phone number">
                </div>

                <div class="input-group">
                    <label>Age</label>
                    <input type="number"
                        formControlName="age"
                        placeholder="Enter your age">
                </div>

                <div class="input-group">
                    <label>Bio</label>
                    <textarea rows="3"
                        formControlName="bio"
                        placeholder="Tell us something about yourself..."></textarea>
                </div>

                <button
                    type="submit"
                    [disabled]="registerForm.invalid">
                    Create Account
                </button>

                <p class="login-link">
                    Already have an account?
                    <a routerLink="/login">Login</a>
                </p>

            </form>

        </div>

    </div>

</div>
