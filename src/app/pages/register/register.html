<div class="register-container">
    <div class="register-card">
        <h2>📝 Create Account</h2>
        <p>Join us by filling in your details</p>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

            <div class="input-group">
                <label for="name">👤 Full Name</label>
                <input id="name" type="text" formControlName="name" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label for="email">📧 Email</label>
                <input id="email" type="email" formControlName="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label for="password">🔒 Password</label>
                <input id="password" type="password" formControlName="password" placeholder="Create a password">
            </div>

            <div class="input-group">
                <label for="phone">📱 Phone Number</label>
                <input id="phone" type="tel" formControlName="phone" placeholder="Enter phone number">
            </div>

            <div class="input-group">
                <label for="age">🎂 Age</label>
                <input id="age" type="number" formControlName="age" placeholder="Enter your age">
            </div>

            <div class="input-group">
                <label for="bio">📝 Bio (optional)</label>
                <textarea id="bio" rows="4" formControlName="bio"
                    placeholder="Tell us something about yourself..."></textarea>
            </div>

            <button type="submit" [disabled]="registerForm.invalid">
                Create Account
            </button>

            <p class="login-link">
                Already have an account?
                <a routerLink="/login">Login</a>
            </p>

        </form>
    </div>
</div>
